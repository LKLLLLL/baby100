<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>知序小天地</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>👶</text></svg>" />
  <style>
    /* ===== 童趣字体系统 ===== */
    /* 本地中文圆体字体（零网络请求，瞬间加载）*/
    @font-face {
      font-family: 'YouSheBangBang';
      src: url('优设字由棒棒体.otf') format('opentype');
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }

    /* ===== 字体变量 - 纯系统字体栈，零延迟 ===== */
    :root {
      /* 中文圆体栈：幼圆(Win) > 兰亭黑(Mac) > 冬青黑(Mac) > 苹方 > 微软雅黑 */
      --font-cn-round: 'YouYuan', '幼圆',
                       'Lantinghei SC', 'Lan Ting',
                       'Hiragino Sans GB',
                       'PingFang SC', 'PingFang TC',
                       'Microsoft YaHei', '微软雅黑',
                       'STHeiti', '华文黑体',
                       sans-serif;

      /* 中文手写装饰体栈 */
      --font-cn-cute: 'YouSheBangBang',
                      'Lantinghei SC', 'Lan Ting',
                      'Hiragino Sans GB',
                      'PingFang SC', 'Microsoft YaHei',
                      cursive;

      /* 大标题展示体（略偏黑体感，Mac上用兰亭黑）*/
      --font-cn-display: 'YouSheBangBang',
                         'YouYuan', '幼圆',
                         'Lantinghei SC', 'Lan Ting',
                         'STHeiti', '华文黑体',
                         'PingFang SC', 'Hiragino Sans GB',
                         'Microsoft YaHei',
                         sans-serif;

      /* 英文/数字栈：系统圆体英文优先 */
      --font-en-round: 'SF Pro Rounded', 'SF Pro Display',
                       '-apple-system', 'BlinkMacSystemFont',
                       'Segoe UI', 'Roboto',
                       sans-serif;

      /* 向下兼容：旧版引用这些变量的地方继续正常工作 */
      --font-fun-bold:    var(--font-cn-round);
      --font-fun-round:   var(--font-en-round);
      --font-fun-playful: var(--font-cn-display);
      --font-fun-cute:    var(--font-cn-round);
      --font-decorative:  var(--font-en-round);
      --font-body:        var(--font-cn-round);
      --font-mono: 'SF Mono', 'Monaco', 'Menlo', 'Courier New', monospace;
    }

    :root {
      /* ===== P5 霓虹配色系统 ===== */
      /* 主色调 - 高饱和霓虹色 */
      --primary-pink: #FF2D78;
      --primary-purple: #BF5FFF;
      --pink: #FF2D78;
      --pink-lt: rgba(255, 45, 120, 0.15);
      --purple: #BF5FFF;
      --purple-lt: rgba(191, 95, 255, 0.15);

      /* 强调色 - 霓虹糖果 */
      --accent-yellow: #FFE033;
      --accent-green: #00F5A0;
      --accent-blue: #00C3FF;
      --accent-orange: #FF6B35;
      --yellow: #FFE033;
      --green: #00F5A0;
      --blue: #00C3FF;

      /* 暗色背景系统 */
      --bg: linear-gradient(135deg, #0D0518 0%, #12062A 40%, #070D1F 70%, #0A1628 100%);
      --bg-primary: #150B2E;
      --bg-secondary: #1A0F35;
      --card-bg: rgba(20, 10, 45, 0.75);

      /* 文字层级 - 亮色适配暗底 */
      --text-primary: #F0E6FF;
      --text-secondary: #B8A0D8;
      --text-tertiary: #7A6A95;
      --text: #F0E6FF;
      --text-lt: #B8A0D8;

      /* 功能色 */
      --success: #6BCB77;
      --warning: #FFD93D;
      --error: #FF6B6B;
      --info: #4D96FF;

      /* 间距系统 (8px基准) */
      --spacing-xs: 4px;
      --spacing-sm: 8px;
      --spacing-md: 16px;
      --spacing-lg: 24px;
      --spacing-xl: 32px;
      --spacing-2xl: 48px;

      /* 字体大小 */
      --text-h1: 3.5rem;
      --text-h2: 2.5rem;
      --text-h3: 1.75rem;
      --text-h4: 1.25rem;
      --text-lg: 1.125rem;
      --text-base: 1rem;
      --text-sm: 0.875rem;
      --text-xs: 0.75rem;

      /* 字重 */
      --font-regular: 400;
      --font-medium: 500;
      --font-semibold: 600;
      --font-bold: 700;

      /* 行高 */
      --leading-tight: 1.2;
      --leading-normal: 1.5;
      --leading-relaxed: 1.75;

      /* 阴影系统 - 霓虹发光 */
      --shadow-sm: 0 2px 12px rgba(0, 0, 0, 0.4);
      --shadow-md: 0 4px 20px rgba(0, 0, 0, 0.5);
      --shadow-lg: 0 8px 40px rgba(0, 0, 0, 0.6);
      --shadow-xl: 0 16px 60px rgba(0, 0, 0, 0.7);
      --shadow-glow: 0 0 25px rgba(255, 45, 120, 0.5), 0 0 50px rgba(255, 45, 120, 0.2);
      --shadow-glow-purple: 0 0 25px rgba(191, 95, 255, 0.5), 0 0 50px rgba(191, 95, 255, 0.2);
      --shadow-glow-blue: 0 0 25px rgba(0, 195, 255, 0.5), 0 0 50px rgba(0, 195, 255, 0.2);
      --shadow-glow-green: 0 0 25px rgba(0, 245, 160, 0.5), 0 0 50px rgba(0, 245, 160, 0.2);

      /* 圆角 */
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --radius-xl: 20px;
      --radius-full: 9999px;

      /* 过渡 */
      --transition-fast: 0.15s;
      --transition-normal: 0.3s;
      --transition-slow: 0.5s;
      --easing: cubic-bezier(0.4, 0, 0.2, 1);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: var(--font-cn-round);
      background: var(--bg);
      color: var(--text);
      overflow-x: hidden;
      min-height: 100vh;
    }

    /* P5风格背景网格纹理 */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(191, 95, 255, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(191, 95, 255, 0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* P5风格角落光晕 */
    body::after {
      content: '';
      position: fixed;
      top: -20%;
      left: -10%;
      width: 50vw;
      height: 50vh;
      background: radial-gradient(ellipse, rgba(191, 95, 255, 0.12) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
      animation: nebula-drift 15s ease-in-out infinite alternate;
    }

    @keyframes nebula-drift {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(5vw, 3vh) scale(1.1); }
    }

    /* ===== 背景装饰 - P5霓虹粒子 ===== */
    .bg-stars {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .bg-star {
      position: absolute;
      width: 3px;
      height: 3px;
      border-radius: 50%;
      animation: neon-twinkle 3s infinite;
    }

    .bg-star:nth-child(3n)   { background: #FF2D78; box-shadow: 0 0 6px #FF2D78; animation-duration: 2.5s; }
    .bg-star:nth-child(3n+1) { background: #BF5FFF; box-shadow: 0 0 6px #BF5FFF; animation-duration: 3.5s; }
    .bg-star:nth-child(3n+2) { background: #00C3FF; box-shadow: 0 0 6px #00C3FF; animation-duration: 2s;   }

    @keyframes neon-twinkle {
      0%, 100% { opacity: 0.15; transform: scale(1); }
      50%       { opacity: 0.9;  transform: scale(2); }
    }

    .bg-icons {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .bg-icon {
      position: absolute;
      font-size: 28px;
      opacity: 0.12;
      animation: float 20s infinite ease-in-out;
      filter: drop-shadow(0 0 8px rgba(191, 95, 255, 0.6));
    }

    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-30px) rotate(10deg); }
    }

    /* ===== 主容器 ===== */
    .main-container {
      position: relative;
      z-index: 1;
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }

    /* ===== 头部 ===== */
    .header {
      text-align: center;
      padding: var(--spacing-2xl) var(--spacing-lg) var(--spacing-lg);
      position: relative;
    }

    .header-title {
      font-family: var(--font-cn-display);
      font-size: var(--text-h1);
      font-weight: 800;
      line-height: var(--leading-tight);
      background: linear-gradient(135deg, #FF2D78 0%, #BF5FFF 50%, #00C3FF 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: var(--spacing-xl);
      animation: bounce 2s infinite;
      filter: drop-shadow(0 0 20px rgba(191, 95, 255, 0.6));
      letter-spacing: 0.03em;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    .hero-photo {
      width: 200px;
      height: 200px;
      border-radius: 50%;
      border: 3px solid transparent;
      background-clip: padding-box;
      box-shadow:
        0 0 0 3px #FF2D78,
        0 0 20px rgba(255, 45, 120, 0.6),
        0 0 40px rgba(191, 95, 255, 0.4),
        0 0 60px rgba(0, 195, 255, 0.2);
      margin: var(--spacing-xl) auto;
      overflow: hidden;
      animation: float 3s infinite ease-in-out;
      background: linear-gradient(135deg, rgba(255, 45, 120, 0.15) 0%, rgba(191, 95, 255, 0.15) 100%);
    }

    .hero-photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: linear-gradient(135deg, var(--pink-lt) 0%, var(--purple-lt) 100%);
      transition: transform var(--transition-slow) var(--easing);
    }

    .hero-photo:hover img {
      transform: scale(1.05) rotate(3deg);
    }

    .level-badge {
      display: inline-block;
      background: linear-gradient(135deg, #FF2D78, #BF5FFF);
      color: white;
      padding: 10px 25px;
      border-radius: var(--radius-full);
      font-size: 1.3rem;
      font-weight: 900;
      font-family: var(--font-cn-round);
      margin-bottom: var(--spacing-lg);
      box-shadow:
        0 0 20px rgba(255, 45, 120, 0.6),
        0 0 40px rgba(191, 95, 255, 0.4),
        0 4px 15px rgba(0, 0, 0, 0.4);
      animation: pulse 2s infinite;
      position: relative;
      overflow: hidden;
      letter-spacing: 0.05em;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .level-badge::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.3), transparent);
      transform: rotate(45deg);
      animation: shine 3s infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 20px rgba(255, 45, 120, 0.6), 0 0 40px rgba(191, 95, 255, 0.3), 0 4px 15px rgba(0,0,0,0.4); }
      50%       { box-shadow: 0 0 35px rgba(255, 45, 120, 0.9), 0 0 60px rgba(191, 95, 255, 0.5), 0 4px 25px rgba(0,0,0,0.5); }
    }

    .nav-buttons {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 30px;
      flex-wrap: wrap;
    }

    .nav-btn {
      padding: 12px 28px;
      border: none;
      border-radius: var(--radius-full);
      font-size: 1.1rem;
      font-weight: 700;
      font-family: var(--font-cn-round);
      cursor: pointer;
      transition: all var(--transition-normal) var(--easing);
      display: flex;
      align-items: center;
      gap: var(--spacing-sm);
      min-height: 48px;
      position: relative;
      overflow: hidden;
      letter-spacing: 0.04em;
    }

    .nav-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.4), transparent);
      transform: translateX(-100%);
      transition: transform 0.6s;
    }

    .nav-btn:hover::before {
      transform: translateX(100%);
    }

    .nav-btn.home {
      background: linear-gradient(135deg, #FF2D78, #BF5FFF);
      color: white;
      box-shadow:
        0 0 20px rgba(255, 45, 120, 0.5),
        0 4px 15px rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255, 45, 120, 0.4);
    }

    .nav-btn.gallery {
      background: linear-gradient(135deg, #FFE033, #00F5A0);
      color: #0D0518;
      box-shadow:
        0 0 20px rgba(0, 245, 160, 0.4),
        0 4px 15px rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(0, 245, 160, 0.3);
    }

    .nav-btn.wishes {
      background: linear-gradient(135deg, #00C3FF, #BF5FFF);
      color: white;
      box-shadow:
        0 0 20px rgba(0, 195, 255, 0.5),
        0 4px 15px rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(0, 195, 255, 0.3);
    }

    .nav-btn:hover {
      transform: translateY(-3px) scale(1.05);
      filter: brightness(1.15);
      box-shadow:
        0 0 30px currentColor,
        0 8px 25px rgba(0, 0, 0, 0.4);
    }

    .nav-btn:active {
      transform: translateY(0) scale(0.98);
    }

    /* ===== 内容区域 - P5暗色玻璃态 ===== */
    .content-section {
      background: rgba(20, 10, 45, 0.7);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: var(--radius-xl);
      padding: var(--spacing-xl);
      margin-bottom: var(--spacing-2xl);
      border: 1px solid rgba(191, 95, 255, 0.25);
      box-shadow:
        0 8px 40px rgba(0, 0, 0, 0.5),
        0 0 0 1px rgba(255, 255, 255, 0.04),
        inset 0 1px 0 rgba(255, 255, 255, 0.06);
      animation: slideUp 0.6s ease-out;
      position: relative;
      overflow: hidden;
    }

    .content-section::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(191, 95, 255, 0.6), rgba(255, 45, 120, 0.6), transparent);
    }

    /* 右下角光晕装饰 */
    .content-section::after {
      content: '';
      position: absolute;
      bottom: -30px;
      right: -30px;
      width: 120px;
      height: 120px;
      background: radial-gradient(circle, rgba(191, 95, 255, 0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .section-title {
      font-family: var(--font-cn-round);
      font-size: var(--text-h2);
      font-weight: 800;
      text-align: center;
      margin-bottom: var(--spacing-lg);
      background: linear-gradient(135deg, #FF2D78 0%, #BF5FFF 60%, #00C3FF 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      position: relative;
      display: inline-block;
      width: 100%;
      letter-spacing: 0.04em;
      filter: drop-shadow(0 0 12px rgba(191, 95, 255, 0.4));
    }

    .section-title::after {
      content: '';
      position: absolute;
      bottom: -8px;
      left: 50%;
      transform: translateX(-50%);
      width: 80px;
      height: 2px;
      background: linear-gradient(90deg, #FF2D78, #BF5FFF, #00C3FF);
      box-shadow: 0 0 10px rgba(191, 95, 255, 0.6);
      border-radius: 2px;
    }

    /* ===== 角色属性卡片 ===== */
    .character-card {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: var(--spacing-lg);
      margin-top: var(--spacing-lg);
    }

    .attr-item {
      background: linear-gradient(135deg, rgba(191, 95, 255, 0.1), rgba(255, 45, 120, 0.1));
      padding: var(--spacing-lg);
      border-radius: var(--radius-lg);
      text-align: center;
      border: 1px solid rgba(191, 95, 255, 0.25);
      transition: all var(--transition-normal) var(--easing);
      position: relative;
      overflow: hidden;
    }

    .attr-item::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.3), transparent);
      transform: rotate(45deg);
      opacity: 0;
      transition: opacity var(--transition-slow);
    }

    .attr-item:hover::before {
      opacity: 1;
      animation: shine 0.5s forwards;
    }

    .attr-item:hover {
      transform: scale(1.05) translateY(-5px);
      box-shadow:
        0 0 20px rgba(191, 95, 255, 0.4),
        0 8px 24px rgba(0, 0, 0, 0.4);
      border-color: var(--primary-purple);
      background: linear-gradient(135deg, rgba(191, 95, 255, 0.2), rgba(255, 45, 120, 0.2));
    }

    .attr-icon {
      font-size: 2.5rem;
      margin-bottom: var(--spacing-sm);
      display: block;
      transition: transform var(--transition-normal);
    }

    .attr-item:hover .attr-icon {
      transform: scale(1.1) rotate(5deg);
    }

    .attr-label {
      font-size: var(--text-base);
      color: var(--text-secondary);
      margin-bottom: var(--spacing-xs);
      font-weight: 600;
      font-family: var(--font-cn-round);
      letter-spacing: 0.03em;
    }

    .attr-value {
      font-size: 1.5rem;
      font-weight: 900;
      color: var(--text-primary);
      font-family: var(--font-decorative);
      letter-spacing: 0.04em;
    }

    /* ===== 成就卡片 ===== */
    .achievements {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: var(--spacing-lg);
    }

    .achievement {
      background: linear-gradient(135deg, rgba(255, 45, 120, 0.08), rgba(191, 95, 255, 0.12));
      backdrop-filter: blur(10px);
      padding: var(--spacing-lg);
      border-radius: var(--radius-lg);
      border: 1px solid rgba(255, 45, 120, 0.3);
      position: relative;
      overflow: hidden;
      transition: all var(--transition-normal) var(--easing);
      box-shadow: var(--shadow-md);
    }

    .achievement::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.4), transparent);
      transform: rotate(45deg);
      transition: all var(--transition-slow);
      opacity: 0;
    }

    .achievement:hover::before {
      opacity: 1;
      animation: shine 0.5s forwards;
    }

    @keyframes shine {
      to {
        left: 100%;
        top: 100%;
      }
    }

    .achievement:hover {
      transform: scale(1.05) translateY(-5px) rotate(-2deg);
      box-shadow:
        0 0 25px rgba(255, 45, 120, 0.5),
        0 0 50px rgba(255, 45, 120, 0.2),
        0 12px 35px rgba(0, 0, 0, 0.5);
      border-color: #FF2D78;
    }

    .achievement-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: var(--text-h4);
      font-weight: 800;
      margin-bottom: var(--spacing-sm);
      color: var(--text-primary);
      font-family: var(--font-cn-round);
      letter-spacing: 0.02em;
    }

    .achievement-badge {
      background: linear-gradient(135deg, #00F5A0, #00C3FF);
      color: #0D0518;
      padding: 5px 12px;
      border-radius: var(--radius-full);
      font-size: 0.9rem;
      font-weight: 800;
      display: flex;
      align-items: center;
      gap: var(--spacing-xs);
      box-shadow: 0 0 12px rgba(0, 245, 160, 0.5);
      font-family: var(--font-fun-round);
      letter-spacing: 0.03em;
    }

    .achievement-desc {
      color: var(--text-secondary);
      font-size: var(--text-base);
      line-height: var(--leading-normal);
      font-family: var(--font-cn-round);
      font-weight: 500;
    }

    .achievement.locked {
      opacity: 0.5;
      filter: grayscale(0.8);
    }

    .achievement.locked .achievement-badge {
      background: linear-gradient(135deg, #ccc, #999);
    }

    .achievement.locked .achievement-badge::before {
      content: '🔒';
    }

    .achievement-badge.completed {
      background: linear-gradient(135deg, #00F5A0, #00C3FF);
      color: #0D0518;
      box-shadow: 0 0 12px rgba(0, 245, 160, 0.6);
    }

    .achievement-badge.completed::before {
      content: '✓';
    }

    .achievement-badge.pending {
      background: linear-gradient(135deg, #FFE033, #FF6B35);
      color: #0D0518;
      box-shadow: 0 0 12px rgba(255, 224, 51, 0.6);
      animation: pulse 2s infinite;
    }

    .achievement-badge.pending::before {
      content: '⏳';
    }

    /* ===== 相册 ===== */
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: var(--spacing-lg);
      margin-top: var(--spacing-lg);
    }

    .gallery-item {
      position: relative;
      border-radius: var(--radius-lg);
      overflow: hidden;
      aspect-ratio: 1;
      border: 2px solid rgba(191, 95, 255, 0.4);
      box-shadow:
        0 0 15px rgba(191, 95, 255, 0.2),
        0 6px 20px rgba(0, 0, 0, 0.4);
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      background: rgba(20, 10, 45, 0.8);
      cursor: pointer;
    }

    .gallery-item::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, transparent 0%, rgba(255, 45, 120, 0.25) 100%);
      opacity: 0;
      transition: opacity 0.3s;
      z-index: 1;
    }

    .gallery-item:hover::before {
      opacity: 1;
    }

    .gallery-item:hover {
      transform: scale(1.05) translateY(-8px) rotate(2deg);
      box-shadow:
        0 0 30px rgba(191, 95, 255, 0.6),
        0 0 60px rgba(255, 45, 120, 0.3),
        0 16px 40px rgba(0, 0, 0, 0.5);
      border-color: #BF5FFF;
      z-index: 10;
    }

    .gallery-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.4s var(--easing);
      background: linear-gradient(135deg, rgba(191, 95, 255, 0.2) 0%, rgba(255, 45, 120, 0.2) 100%);
      min-height: 200px;
    }

    .gallery-item:hover img {
      transform: scale(1.15);
    }

    .gallery-badge {
      position: absolute;
      top: 10px;
      right: 10px;
      background: linear-gradient(135deg, #00F5A0, #00C3FF);
      color: #0D0518;
      width: 35px;
      height: 35px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      font-weight: var(--font-bold);
      box-shadow:
        0 0 15px rgba(0, 245, 160, 0.7),
        0 0 30px rgba(0, 195, 255, 0.4);
      animation: bounce 2s infinite;
      z-index: 2;
    }

    .gallery-info {
      text-align: center;
      margin-top: var(--spacing-lg);
      font-size: var(--text-lg);
      font-weight: 900;
      color: #0D0518;
      padding: var(--spacing-md);
      background: linear-gradient(135deg, #FFE033, #00F5A0);
      border-radius: var(--radius-lg);
      box-shadow:
        0 0 20px rgba(0, 245, 160, 0.4),
        var(--shadow-sm);
      position: relative;
      overflow: hidden;
      font-family: var(--font-cn-round);
      letter-spacing: 0.05em;
    }

    .gallery-info::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.3), transparent);
      transform: rotate(45deg);
      animation: shine 3s infinite;
    }

    /* ===== 祝福墙 ===== */
    .wishes-wall {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: var(--spacing-xl);
      margin-top: var(--spacing-lg);
    }

    .wish-card {
      background: linear-gradient(135deg, rgba(255, 45, 120, 0.08), rgba(191, 95, 255, 0.12));
      backdrop-filter: blur(10px);
      padding: var(--spacing-lg);
      border-radius: var(--radius-lg);
      position: relative;
      border: 1px solid rgba(255, 45, 120, 0.25);
      transform: rotate(calc(var(--rotation) * 1deg));
      transition: all var(--transition-normal) var(--easing);
      box-shadow: var(--shadow-md);
    }

    .wish-card::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.4), transparent);
      transform: rotate(45deg);
      opacity: 0;
      transition: all var(--transition-slow);
    }

    .wish-card:hover::before {
      opacity: 1;
      animation: shine 0.6s forwards ease-out;
    }

    .wish-card:hover {
      transform: rotate(0deg) scale(1.05) translateY(-5px);
      box-shadow:
        0 0 25px rgba(255, 45, 120, 0.5),
        0 0 50px rgba(255, 45, 120, 0.2),
        0 12px 35px rgba(0, 0, 0, 0.5);
      border-color: #FF2D78;
      z-index: 10;
    }

    .wish-icon {
      font-size: 2rem;
      margin-bottom: var(--spacing-sm);
      display: inline-block;
      transition: transform var(--transition-normal);
    }

    .wish-card:hover .wish-icon {
      transform: scale(1.2) rotate(10deg);
    }

    .wish-text {
      font-size: var(--text-base);
      line-height: var(--leading-normal);
      color: var(--text-primary);
      font-weight: 500;
      text-shadow: 0 1px 2px rgba(255, 255, 255, 0.3);
      font-family: var(--font-cn-round);
      letter-spacing: 0.02em;
    }

    .wish-author {
      margin-top: var(--spacing-md);
      font-size: var(--text-sm);
      color: var(--text-secondary);
      font-style: italic;
      font-weight: 700;
      font-family: var(--font-fun-round);
    }

    /* ===== 发表祝福表单 ===== */
    .wish-form {
      background: rgba(20, 10, 45, 0.8);
      backdrop-filter: blur(10px);
      padding: var(--spacing-xl);
      border-radius: var(--radius-lg);
      border: 1px solid rgba(191, 95, 255, 0.3);
      margin-bottom: var(--spacing-2xl);
      box-shadow:
        0 0 20px rgba(191, 95, 255, 0.15),
        var(--shadow-md);
      position: relative;
      overflow: hidden;
    }

    .wish-form::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(191, 95, 255, 0.7), rgba(255, 45, 120, 0.7), transparent);
    }

    .form-group {
      margin-bottom: var(--spacing-lg);
    }

    .form-label {
      display: block;
      font-size: var(--text-base);
      font-weight: 700;
      margin-bottom: var(--spacing-sm);
      color: var(--text-primary);
      font-family: var(--font-cn-round);
      letter-spacing: 0.04em;
    }

    .form-input {
      width: 100%;
      padding: 14px 18px;
      border: 1px solid rgba(191, 95, 255, 0.3);
      border-radius: var(--radius-md);
      font-size: var(--text-base);
      font-family: var(--font-cn-round);
      transition: all var(--transition-normal) var(--easing);
      background: rgba(255, 255, 255, 0.06);
      color: var(--text-primary);
      backdrop-filter: blur(5px);
      letter-spacing: 0.02em;
    }

    .form-input::placeholder {
      color: var(--text-tertiary);
    }

    .form-input:hover {
      border-color: rgba(191, 95, 255, 0.6);
      box-shadow: 0 0 10px rgba(191, 95, 255, 0.2);
    }

    .form-input:focus {
      outline: none;
      border-color: #BF5FFF;
      background: rgba(191, 95, 255, 0.08);
      box-shadow:
        0 0 0 3px rgba(191, 95, 255, 0.15),
        0 0 20px rgba(191, 95, 255, 0.3);
    }

    .form-textarea {
      width: 100%;
      padding: 14px 18px;
      border: 1px solid rgba(191, 95, 255, 0.3);
      border-radius: var(--radius-md);
      font-size: var(--text-base);
      font-family: var(--font-cn-round);
      transition: all var(--transition-normal) var(--easing);
      background: rgba(255, 255, 255, 0.06);
      color: var(--text-primary);
      backdrop-filter: blur(5px);
      min-height: 120px;
      resize: vertical;
      letter-spacing: 0.02em;
    }

    .form-textarea::placeholder {
      color: var(--text-tertiary);
    }

    .form-textarea:hover {
      border-color: rgba(191, 95, 255, 0.6);
      box-shadow: 0 0 10px rgba(191, 95, 255, 0.2);
    }

    .form-textarea:focus {
      outline: none;
      border-color: #BF5FFF;
      background: rgba(191, 95, 255, 0.08);
      box-shadow:
        0 0 0 3px rgba(191, 95, 255, 0.15),
        0 0 20px rgba(191, 95, 255, 0.3);
    }

    .form-submit {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #FF2D78 0%, #BF5FFF 50%, #00C3FF 100%);
      color: white;
      border: none;
      border-radius: var(--radius-md);
      font-size: var(--text-lg);
      font-weight: 900;
      font-family: var(--font-cn-round);
      cursor: pointer;
      transition: all var(--transition-normal) var(--easing);
      box-shadow:
        0 0 20px rgba(255, 45, 120, 0.5),
        0 0 40px rgba(191, 95, 255, 0.3),
        0 6px 24px rgba(0, 0, 0, 0.4);
      position: relative;
      overflow: hidden;
      letter-spacing: 0.06em;
    }

    .form-submit::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.4), transparent);
      transform: translateX(-100%);
      transition: transform 0.6s;
    }

    .form-submit:hover::before {
      transform: translateX(100%);
    }

    .form-submit:hover {
      transform: translateY(-3px);
      box-shadow:
        0 0 30px rgba(255, 45, 120, 0.7),
        0 0 60px rgba(191, 95, 255, 0.4),
        0 8px 25px rgba(0, 0, 0, 0.5);
      filter: brightness(1.1);
    }

    .form-submit:active {
      transform: translateY(0) scale(0.98);
      box-shadow:
        0 0 15px rgba(255, 45, 120, 0.5),
        0 4px 15px rgba(0, 0, 0, 0.4);
    }

    .empty-wishes {
      text-align: center;
      padding: var(--spacing-3xl) var(--spacing-lg);
      background: linear-gradient(135deg, rgba(255, 45, 120, 0.06), rgba(191, 95, 255, 0.1));
      backdrop-filter: blur(10px);
      border-radius: var(--radius-lg);
      border: 2px dashed rgba(191, 95, 255, 0.4);
      box-shadow:
        0 0 20px rgba(191, 95, 255, 0.1),
        var(--shadow-sm);
    }

    .empty-wishes-icon {
      font-size: 4rem;
      margin-bottom: var(--spacing-lg);
      display: block;
      animation: float 3s infinite ease-in-out;
    }

    .empty-wishes-text {
      font-size: var(--text-lg);
      color: var(--text-secondary);
      margin-bottom: var(--spacing-sm);
      font-weight: 700;
      font-family: var(--font-cn-round);
      letter-spacing: 0.04em;
    }

    .empty-wishes-hint {
      font-size: var(--text-base);
      color: var(--text-tertiary);
      opacity: 0.8;
      font-family: var(--font-cn-round);
      font-weight: 500;
    }

    /* ===== 装饰元素 ===== */
    .decoration {
      position: absolute;
      font-size: 2rem;
      animation: float 3s infinite ease-in-out;
      pointer-events: none;
    }

    /* ===== 增强视觉效果 - 光晕效果 ===== */
    .glow-effect {
      position: relative;
    }

    .glow-effect::after {
      content: '';
      position: absolute;
      inset: -4px;
      background: linear-gradient(45deg,
        var(--primary-pink),
        var(--primary-purple),
        var(--accent-yellow),
        var(--primary-pink)
      );
      border-radius: inherit;
      z-index: -1;
      opacity: 0;
      transition: opacity var(--transition-normal);
      animation: glow-rotate 3s linear infinite;
      background-size: 400% 400%;
    }

    .glow-effect:hover::after {
      opacity: 0.6;
    }

    @keyframes glow-rotate {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* ===== 滚动条美化 - P5霓虹 ===== */
    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: rgba(20, 10, 45, 0.8);
    }

    ::-webkit-scrollbar-thumb {
      background: linear-gradient(180deg, #FF2D78, #BF5FFF, #00C3FF);
      border-radius: 3px;
      box-shadow: 0 0 8px rgba(191, 95, 255, 0.6);
    }

    ::-webkit-scrollbar-thumb:hover {
      background: linear-gradient(180deg, #00C3FF, #BF5FFF, #FF2D78);
    }

    /* ===== 选择文本样式 ===== */
    ::selection {
      background: rgba(191, 95, 255, 0.4);
      color: white;
    }

    /* ===== 图片加载占位符 ===== */
    .gallery-item img,
    .hero-photo img {
      background: linear-gradient(135deg,
        rgba(191, 95, 255, 0.2) 0%,
        rgba(255, 45, 120, 0.2) 50%,
        rgba(191, 95, 255, 0.2) 100%
      );
      background-size: 200% 200%;
      animation: shimmer 1.5s infinite;
    }

    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* ===== P5 右下角霓虹光晕 ===== */
    .nebula-right {
      position: fixed;
      bottom: -10%;
      right: -10%;
      width: 50vw;
      height: 50vh;
      background: radial-gradient(ellipse, rgba(255, 45, 120, 0.1) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
      animation: nebula-drift-r 18s ease-in-out infinite alternate;
    }

    @keyframes nebula-drift-r {
      0%   { transform: translate(0, 0) scale(1); }
      100% { transform: translate(-4vw, -3vh) scale(1.15); }
    }

    /* ===== P5 中央扫描线（极微弱，仅增加纹理） ===== */
    .scanline {
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(191, 95, 255, 0.012) 2px,
        rgba(191, 95, 255, 0.012) 4px
      );
      pointer-events: none;
      z-index: 1;
    }
    @media (max-width: 768px) {
      .header-title {
        font-size: var(--text-h2);
      }

      .level-badge {
        font-size: 1.1rem;
        padding: 8px 20px;
      }

      .nav-buttons {
        flex-direction: column;
        align-items: center;
        gap: var(--spacing-md);
      }

      .nav-btn {
        width: 100%;
        max-width: 300px;
        min-height: 52px; /* 移动端触控目标最小52px */
        justify-content: center;
        font-size: 1.1rem; /* 稍微增大字体便于点击 */
      }

      .gallery-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: var(--spacing-md);
      }

      .gallery-badge {
        width: 28px;
        height: 28px;
        font-size: 1rem;
      }

      .character-card {
        grid-template-columns: 1fr;
        gap: var(--spacing-md);
      }

      .attr-item {
        padding: var(--spacing-md); /* 减少内边距 */
        min-height: 80px; /* 确保触控区域足够 */
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
      }

      .hero-photo {
        width: 150px;
        height: 150px;
      }

      .wishes-wall {
        grid-template-columns: 1fr;
        gap: var(--spacing-md);
      }

      .wish-card {
        padding: var(--spacing-md);
        min-height: 120px; /* 确保触控区域 */
      }

      .achievements {
        grid-template-columns: 1fr;
        gap: var(--spacing-md);
      }

      .achievement {
        padding: var(--spacing-md);
        min-height: 100px;
      }
    }

    @media (max-width: 480px) {
      .main-container {
        padding: var(--spacing-md);
      }

      .content-section {
        padding: var(--spacing-lg);
      }

      .gallery-grid {
        grid-template-columns: 1fr;
        gap: var(--spacing-md);
      }

      .header-title {
        font-size: var(--text-h3);
        line-height: var(--leading-tight);
        padding: 0 var(--spacing-sm); /* 添加水平内边距避免换行问题 */
      }

      .hero-photo {
        width: 120px;
        height: 120px;
      }

      .section-title {
        font-size: var(--text-h3);
        line-height: var(--leading-tight);
        margin-bottom: var(--spacing-md);
      }

      .section-title::after {
        width: 60px; /* 缩小装饰线宽度 */
        height: 2px;
        bottom: -6px;
      }

      .wish-form {
        padding: var(--spacing-lg);
      }

      .form-label {
        font-size: var(--text-sm); /* 稍微减小标签字体 */
      }

      .form-input,
      .form-textarea {
        padding: 12px 16px; /* 稍微减小内边距 */
        font-size: var(--text-base);
        min-height: 48px; /* 确保触控目标足够 */
      }

      .form-textarea {
        min-height: 100px;
      }

      .form-submit {
        padding: 14px 20px;
        font-size: var(--text-base);
        min-height: 52px; /* 确保触控目标 */
      }

      .attr-value {
        font-size: 1.3rem; /* 稍微减小 */
      }

      .attr-label {
        font-size: 0.9rem;
      }

      .achievement-title {
        font-size: var(--text-base);
      }

      .achievement-desc {
        font-size: 0.9rem;
        line-height: var(--leading-normal);
      }

      .wish-text {
        font-size: var(--text-sm);
        line-height: var(--leading-normal);
      }

      .wish-author {
        font-size: 0.8rem;
        margin-top: var(--spacing-sm);
      }

      .empty-wishes-icon {
        font-size: 3rem; /* 减小图标 */
      }

      .empty-wishes-text {
        font-size: var(--text-base);
      }

      .empty-wishes-hint {
        font-size: var(--text-sm);
      }

      .gallery-info {
        font-size: var(--text-base);
        padding: var(--spacing-md);
      }

      .footer {
        font-size: var(--text-sm);
        padding: var(--spacing-xl) var(--spacing-md);
      }
    }

    /* ===== 移动端额外优化 ===== */
    @media (max-width: 480px) and (orientation: portrait) {
      /* 竖屏模式优化 */
      .header {
        padding: var(--spacing-lg) var(--spacing-sm);
      }

      .header-title {
        font-size: 1.8rem; /* 进一步减小 */
      }

      .level-badge {
        font-size: 1rem;
        padding: 6px 16px;
      }

      .main-container {
        padding: var(--spacing-sm);
      }

      .content-section {
        padding: var(--spacing-md);
        margin-bottom: var(--spacing-lg);
        border-radius: var(--radius-md); /* 稍微减小圆角 */
      }

      .gallery-item {
        border-width: 2px; /* 减小边框 */
      }

      .gallery-item:hover {
        transform: scale(1.02); /* 减小缩放效果 */
      }

      /* 优化触摸反馈 - 移动端不需要悬停效果 */
      .nav-btn:hover,
      .card-item:hover,
      .wish-card:hover {
        transform: none; /* 移除悬停变换 */
      }

      /* 添加触摸激活效果 */
      @media (hover: none) and (pointer: coarse) {
        .nav-btn:active {
          transform: scale(0.95);
          opacity: 0.8;
        }

        .attr-item:active,
        .achievement:active,
        .wish-card:active {
          transform: scale(0.98);
          opacity: 0.9;
        }

        .gallery-item:active {
          transform: scale(0.98);
        }
      }
    }

    /* ===== 超小屏幕优化 ===== */
    @media (max-width: 360px) {
      .header-title {
        font-size: 1.6rem;
      }

      .hero-photo {
        width: 100px;
        height: 100px;
      }

      .attr-item {
        padding: var(--spacing-sm);
      }

      .attr-value {
        font-size: 1.2rem;
      }

      .attr-icon {
        font-size: 2rem;
      }

      .achievement,
      .wish-card {
        padding: var(--spacing-sm);
      }

      /* 移动端图片优化 */
      .gallery-item img {
        min-height: 150px; /* 确保最小高度 */
      }

      .hero-photo img {
        min-height: 120px;
      }

      /* 优化背景图标 - 移动端减少干扰 */
      .bg-icon {
        font-size: 16px;
        opacity: 0.08;
      }

      .bg-star {
        width: 3px;
        height: 3px;
      }
    }

    /* ===== 横屏模式优化 ===== */
    @media (max-width: 896px) and (orientation: landscape) {
      .header-title {
        font-size: 2rem;
      }

      .hero-photo {
        width: 140px;
        height: 140px;
      }

      .nav-buttons {
        flex-direction: row; /* 横屏保持水平 */
        gap: var(--spacing-md);
      }

      .nav-btn {
        width: auto;
        min-width: 140px;
      }

      .character-card {
        grid-template-columns: repeat(2, 1fr); /* 横屏2列 */
      }

      .wishes-wall {
        grid-template-columns: repeat(2, 1fr);
      }

      .achievements {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    /* ===== 性能优化 - 减少动画 ===== */
    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }

      /* 进一步降低背景干扰 */
      .bg-star,
      .bg-icon {
        opacity: 0.02;
      }
    }

    /* ===== 移动端触摸优化 ===== */
    @media (hover: none) and (pointer: coarse) {
      /* 移除移动端的悬停效果 */
      .nav-btn:hover,
      .gallery-item:hover,
      .attr-item:hover,
      .achievement:hover,
      .wish-card:hover,
      .hero-photo:hover {
        transform: none;
      }

      /* 添加触摸反馈 */
      .nav-btn:active {
        transform: scale(0.95);
        opacity: 0.9;
        transition: transform 0.1s;
      }

      .gallery-item:active {
        transform: scale(0.97);
        opacity: 0.95;
        transition: transform 0.1s;
      }

      .attr-item:active,
      .achievement:active,
      .wish-card:active {
        transform: scale(0.97);
        opacity: 0.9;
        transition: transform 0.1s;
      }

      /* 表单输入优化 */
      .form-input:active,
      .form-textarea:active {
        transform: scale(0.99);
      }

      /* 禁用不必要的动画 */
      .bg-star,
      .bg-icon {
        animation: none; /* 移动端禁用背景动画以提升性能 */
        opacity: 0.05; /* 降低透明度 */
      }
    }

    /* ===== 移动端滚动优化 ===== */
    @media (max-width: 480px) {
      .main-container {
        -webkit-overflow-scrolling: touch; /* iOS平滑滚动 */
        overscroll-behavior: none; /* 禁用过度滚动 */

      /* 优化点击区域 */

    /* ===== 移动端字体渲染优化 ===== */
    @media (max-width: 480px) {

        -moz-osx-font-smoothing: grayscale;
        text-rendering: optimizeLegibility;
      }

    /* ===== 高对比度模式 ===== */
    @media (prefers-contrast: high) {
      :root {
        --card-bg: rgba(255, 255, 255, 0.95);
      }

      .content-section,
      .attr-item,
      .achievement,
      .wish-card {
        border: 3px solid var(--primary-pink);

    /* ===== 页脚 ===== */
    .footer {
      text-align: center;
      padding: var(--spacing-2xl);
      color: var(--text-secondary);
      font-size: var(--text-base);
      position: relative;
      font-family: var(--font-cn-round);

    .footer::before {
      content: '';

      top: 0;
      left: 50%;
      transform: translateX(-50%);

      height: 1px;
      background: linear-gradient(90deg, transparent, var(--primary-pink), transparent);

    .footer-heart {
      color: var(--primary-pink);
      animation: pulse 1.5s infinite;
      display: inline-block;
    }

<body>

  <!-- 主容器 -->

    <!-- 关于宝宝 -->

      <h2 class="section-title" style="margin-top: 40px;">🏆 成就解锁</h2>

    <!-- 成长相册 -->
    <section id="gallery" class="content-section">
      <h2 class="section-title">📸 成长收集册</h2>

    <!-- 祝福愿望 -->
    <section id="wishes" class="content-section">
      <h2 class="section-title">💝 祝福愿望墙</h2>

      <!-- 发表祝福表单 -->
      <div class="wish-form">
        <h3 style="font-size: 1.5rem; margin-bottom: 20px; color: var(--text); font-family: var(--font-cn-round); font-weight: 800; letter-spacing: 0.04em;">✨ 发表你的祝福</h3>
        <div class="form-group">
          <label class="form-label" for="wishAuthor">你的名字</label>
          <input
            type="text"
            class="form-input"
            id="wishAuthor"
            placeholder="请输入你的名字"
            autocomplete="name"
            autocapitalize="words"
            spellcheck="false"
          />
        </div>
        <div class="form-group">
          <label class="form-label" for="wishPhone">联系方式（匿名，仅后台可见）</label>
          <input
            type="tel"
            class="form-input"

          />

            class="form-textarea"

            placeholder="写下你对宝宝的祝福..."
            rows="4"

          ></textarea>

      <!-- 祝福列表 -->

      <!-- 空状态 -->
      <div class="empty-wishes" id="emptyWishes">

    <!-- 页脚 -->
    <footer class="footer">

  <script>
    // 宝宝出生日期
    const babyBirthDate = new Date('2025-12-15');

    // 计算宝宝月龄和等级
    function calculateBabyAge() {
      const now = new Date();
      const diffTime = now - babyBirthDate;
      const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
      return diffDays;
    }

    // 计算月龄
    function calculateMonths() {
      const now = new Date();
      const diffTime = now - babyBirthDate;
      const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
      const months = Math.floor(diffDays / 30);
      return months;
    }

    // 根据月龄获取等级和称号
    function getLevelByMonths(months) {
      // 每增加一个月,等级上升一级
      const level = months >= 1 ? months : 1; // 至少1级

      // 根据等级返回不同的称号
      const titles = [
        '小鼻嘎',      // LV.1
        '小可爱',      // LV.2
        '小萌宝',      // LV.3
        '小天使',      // LV.4
        '小甜心',      // LV.5
        '小宝贝',      // LV.6
        '小公主',      // LV.7
        '小王子',      // LV.8
        '小明星',      // LV.9
        '小勇士',      // LV.10
        '小超人',      // LV.11
        '小英雄',      // LV.12
      ];

      return {
        level: level,
        title: titles[(level - 1) % titles.length] // 循环使用称号
      };
    }

    // 更新年龄和等级显示
    function updateBabyAge() {
      const ageElement = document.getElementById('babyAge');
      const levelBadgeElement = document.querySelector('.level-badge');

      const age = calculateBabyAge();
      const months = calculateMonths();
      const levelInfo = getLevelByMonths(months);

      // 更新年龄显示
      ageElement.textContent = `${age}天 (${months}个月)`;

      // 更新等级徽章
      levelBadgeElement.textContent = `🏆 LV.${levelInfo.level} ${levelInfo.title}`;

      // 更新成就列表
      updateAchievements();
    }

    // 成就数据定义
    const achievements = [
      {
        id: 'first-cry',
        title: '第一声啼哭',
        desc: '在这个特别的日子,你来到这个世界,给爸爸妈妈带来了无尽的欢乐!',
        unlockDays: 0, // 0天即可解锁
        icon: '👶'
      },
      {
        id: 'first-smile',
        title: '第一次微笑',
        desc: '那个甜美的笑容,让整个世界都亮了起来,是爸爸妈妈最珍贵的瞬间!',
        unlockDays: 15, // 15天左右
        icon: '😊'
      },
      {
        id: 'first-head',
        title: '第一次抬头',
        desc: '努力抬起小脑袋,第一次看清这个精彩的世界!',
        unlockDays: 60, // 2个月左右
        icon: '👀'
      },
      {
        id: '100-days',
        title: '100天达成',
        desc: '100天的成长,从襁褓中的小不点,到现在的可爱宝宝!',
        unlockDays: 100,
        icon: '🎂'
      },
      {
        id: 'first-sit',
        title: '能坐起来了',
        desc: '能独立坐一会儿了,探索世界的视角不一样啦!',
        unlockDays: 180, // 6个月左右
        icon: '🪑'
      },
      {
        id: 'first-crawl',
        title: '会爬行了',
        desc: '努力爬行,向世界前进了一大步!',
        unlockDays: 240, // 8个月左右
        icon: '🐛'
      },
      {
        id: 'first-stand',
        title: '能站立了',
        desc: '扶着东西能站起来了,准备好学走路啦!',
        unlockDays: 300, // 10个月左右
        icon: '🧍'
      },
      {
        id: 'first-word',
        title: '第一句话',
        desc: '咿呀学语,说出了第一句话,是生命中最美的声音!',
        unlockDays: 330, // 11个月左右
        icon: '🗣️'
      },
      {
        id: 'first-steps',
        title: '迈出第一步',
        desc: '摇摇晃晃的第一步,开启人生新的篇章!',
        unlockDays: 360, // 12个月左右
        icon: '👣'
      },
      {
        id: 'one-year',
        title: '一岁啦',
        desc: '满一周岁了,这一年成长了太多,未来还有更多精彩!',
        unlockDays: 365,
        icon: '🎉'
      }
    ];

    // 更新成就显示
    function updateAchievements() {
      const achievementsList = document.getElementById('achievementsList');
      const days = calculateBabyAge();

      if (!achievementsList) return;

      achievementsList.innerHTML = achievements.map(achievement => {
        const isUnlocked = days >= achievement.unlockDays;
        const status = isUnlocked ? 'completed' : 'pending';

        return `
          <div class="achievement ${!isUnlocked ? 'locked' : ''}" data-id="${achievement.id}">
            <div class="achievement-title">
              ${achievement.icon} ${achievement.title}
              <span class="achievement-badge ${status}"></span>
            </div>
            <div class="achievement-desc">
              ${isUnlocked ? achievement.desc : `还需 ${achievement.unlockDays - days} 天解锁`}
            </div>
          </div>
        `;
      }).join('');
    }

    // Supabase 配置
    const SUPABASE_URL = 'https://cyrjnwyaymyuyomijzly.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN5cmpud3lheW15dXlvbWlqemx5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5MjY3NjgsImV4cCI6MjA4OTUwMjc2OH0.XCiYchSG-0p2tOrbIYF6JOn_WBu3fyWGcRADF8PuqAw';

    // 存储祝福数据
    let wishes = [];

    // 从Supabase加载祝福
    async function loadWishes() {
      try {
        const response = await fetch(`${SUPABASE_URL}/rest/v1/comments?select=*&order=created_at.desc`, {
          headers: {
            'apikey': SUPABASE_KEY,
            'Authorization': `Bearer ${SUPABASE_KEY}`
          }
        });
        const data = await response.json();
        wishes = data.map(item => ({
          id: item.id,
          author: item.author,
          content: item.content,
          icon: item.icon,
          rotation: Math.random() * 6 - 3
        }));
        renderWishes();
      } catch (err) {
        console.error('加载祝福出错:', err);
      }
    }

    // 保存祝福到Supabase
    async function saveWishToSupabase(wish) {
      const response = await fetch(`${SUPABASE_URL}/rest/v1/comments`, {
        method: 'POST',
        headers: {
          'apikey': SUPABASE_KEY,
          'Authorization': `Bearer ${SUPABASE_KEY}`,
          'Content-Type': 'application/json',
          'Prefer': 'return=minimal'
        },
        body: JSON.stringify({
          author: wish.author,
          content: wish.content,
          icon: wish.icon,
          phone: wish.phone || ''
        })
      });
      if (!response.ok) throw new Error('保存失败');
    }

    // 生成背景星星
    function createStars() {
      const container = document.getElementById('bgStars');
      for (let i = 0; i < 50; i++) {
        const star = document.createElement('div');
        star.className = 'bg-star';
        star.style.left = Math.random() * 100 + '%';
        star.style.top = Math.random() * 100 + '%';
        star.style.animationDelay = Math.random() * 2 + 's';
        container.appendChild(star);
      }
    }

    // 生成背景图标
    function createIcons() {
      const container = document.getElementById('bgIcons');
      const icons = ['🎮', '⭐', '🎈', '🎉', '🌟', '✨', '💖', '🎀', '🎵', '🌸', '🎶', '💫', '🌈', '🎪', '🎭'];
      for (let i = 0; i < 15; i++) {
        const icon = document.createElement('div');
        icon.className = 'bg-icon';
        icon.textContent = icons[Math.floor(Math.random() * icons.length)];
        icon.style.left = Math.random() * 100 + '%';
        icon.style.top = Math.random() * 100 + '%';
        icon.style.animationDelay = Math.random() * 5 + 's';
        container.appendChild(icon);
      }
    }

    // 显示指定区块
    function showSection(sectionId) {
      const sections = ['about', 'gallery', 'wishes'];
      sections.forEach(id => {
        const section = document.getElementById(id);
        if (id === sectionId) {
          section.style.display = 'block';
          section.style.animation = 'none';
          section.offsetHeight; // 触发重绘
          section.style.animation = 'slideUp 0.6s ease-out';
        } else {
          section.style.display = 'none';
        }
      });

      // 滚动到对应位置
      document.getElementById(sectionId).scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    // 提交祝福
    async function submitWish() {
      const authorInput = document.getElementById('wishAuthor');
      const contentInput = document.getElementById('wishContent');
      const phoneInput = document.getElementById('wishPhone');

      const author = authorInput.value.trim();
      const content = contentInput.value.trim();
      const phone = phoneInput ? phoneInput.value.trim() : '';

      if (!author || !content) {
        alert('请填写名字和祝福内容!');
        return;
      }

      const icons = ['🌟', '💖', '🎈', '🎉', '💝', '🌈', '✨', '🎀', '💫', '🎵'];
      const icon = icons[Math.floor(Math.random() * icons.length)];

      const wish = {
        id: Date.now(),
        author: author,
        content: content,
        icon: icon,
        phone: phone,
        rotation: Math.random() * 6 - 3 // -3到3度的随机旋转
      };

      wishes.unshift(wish);
      await saveWishToSupabase(wish); // 保存到云端
      renderWishes();

      // 清空表单
      authorInput.value = '';
      contentInput.value = '';
      if (phoneInput) phoneInput.value = '';

      alert('祝福发送成功! 💝');
    }

    // 渲染祝福列表
    function renderWishes() {
      const wishesList = document.getElementById('wishesList');
      const emptyWishes = document.getElementById('emptyWishes');

      if (wishes.length === 0) {
        wishesList.innerHTML = '';
        emptyWishes.style.display = 'block';
        return;
      }

      const total = wishes.length;
      emptyWishes.style.display = 'none';
      // wishes 已按时间倒序排列（最新在前），楼层从高到低展示
      wishesList.innerHTML = wishes.map((wish, index) => {
        const floor = total - index; // 第1楼是最早那条
        return `
        <div class="wish-card" style="--rotation: ${wish.rotation};">
          <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
            <div class="wish-icon" style="margin-bottom:0;">${wish.icon || '💝'}</div>
            <span style="
              font-size: 0.75rem;
              font-weight: 800;
              font-family: var(--font-en-round);
              color: var(--primary-purple);
              background: rgba(191,95,255,0.15);
              border: 1px solid rgba(191,95,255,0.3);
              border-radius: 20px;
              padding: 2px 10px;
              letter-spacing: 0.04em;
            ">B${floor}</span>
          </div>
          <div class="wish-text">${wish.content}</div>
          <div class="wish-author">— ${wish.author}</div>
        </div>
      `}).join('');
    }

    // 初始化
    document.addEventListener('DOMContentLoaded', function() {
      showSection('about');
    });

    // 页面加载时初始化
    window.onload = function() {
      updateBabyAge(); // 更新年龄和等级
      loadWishes(); // 加载祝福
      createStars(); // 创建背景星星
      createIcons(); // 创建背景图标

      // 每分钟更新一次年龄和等级
      setInterval(updateBabyAge, 60000);
    };
  </script>
</body>
